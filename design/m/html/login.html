<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연애판별소 - 로그인</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <script type="module" src="../js/login.js"></script>
</head>
<body>
    <div id="app" class="login-app">
        <!-- 상단 네비게이션 (뒤로가기) -->
        <header class="login-header">
            <button class="btn-back" onclick="history.back()">←</button>
            <div class="logo">연애판별소</div>
            <div style="width: 24px;"></div> <!-- 타이틀 중앙 정렬용 여백 -->
        </header>

        <section class="login-section">
            <div class="login-title-wrap">
                <div class="icon-heart">💖</div>
                <h1 class="login-title">다시 만나서 반가워요!</h1>
                <p class="login-desc">당신의 썸 판별 리포트를<br>지금 바로 확인해보세요.</p>
            </div>

            <div class="login-btn-wrap">
                <button class="btn-sns kakao" id="btnKakaoLogin">
                    <span class="icon-kakao"></span>
                    카카오 간편 로그인
                </button>
                <button class="btn-sns google" id="btnGoogleLogin">
                    <span class="icon-google"></span>
                    구글 간편 로그인
                </button>
            </div>
            
            <div class="login-footer">
                <p>로그인 시 연애판별소의 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하게 됩니다.</p>
            </div>
        </section>
    </div>
</body>
</html>
